<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roturbo - Painel ADM</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #f4f6f9; color: #333; font-family: Arial, sans-serif; padding: 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; background: #000; color: #fff; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; }
        .cards-resumo { display: flex; gap: 15px; margin-bottom: 20px; }
        .card-adm { flex: 1; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; border-bottom: 4px solid #007bff; }
        .tabela-usuarios { width: 100%; border-collapse: collapse; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; }
        .tabela-usuarios th, .tabela-usuarios td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        .tabela-usuarios th { background: #007bff; color: white; }
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; color: white; }
        .badge.pro { background: #ffc107; color: #000; }
        .badge.gratis { background: #6c757d; }
        .badge.ativo { background: #28a745; }
        .badge.bloqueado { background: #dc3545; }
        .btn-acao { border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; margin-right: 5px; }
        .btn-acao.btn-pro { background: #ffc107; color: #000; }
        .btn-acao.btn-bloquear { background: #dc3545; }
        .btn-acao.btn-desbloquear { background: #28a745; }
    </style>
</head>
<body>

    <div class="admin-header">
        <h2>⚙️ Roturbo - Centro de Comando (ADM)</h2>
        <button id="btn-sair-adm" style="background: #dc3545; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">Sair</button>
    </div>

    <div class="cards-resumo">
        <div class="card-adm">
            <h3>👥 Total de Usuários</h3>
            <h2 id="adm-total-usuarios">0</h2>
        </div>
        <div class="card-adm" style="border-color: #ffc107;">
            <h3>⭐ Assinantes PRO</h3>
            <h2 id="adm-total-pro">0</h2>
        </div>
        <div class="card-adm" style="border-color: #dc3545;">
            <h3>🔒 Bloqueados</h3>
            <h2 id="adm-total-bloqueados">0</h2>
        </div>
    </div>

    <h3 style="margin-bottom: 10px;">Lista de Motoristas</h3>
    <table class="tabela-usuarios">
        <thead>
            <tr>
                <th>Nome</th>
                <th>E-mail</th>
                <th>Plano</th>
                <th>Status</th>
                <th>Ações Rápida</th>
            </tr>
        </thead>
        <tbody id="tabela-corpo">
            <tr><td colspan="5" style="text-align: center;">Carregando usuários...</td></tr>
        </tbody>
    </table>

    <script type="module" src="admin.js"></script>
</body>
</html>
