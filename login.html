<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roturbo - Acesso</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('PWA ativo na tela de Login'))
            .catch(err => console.log('Erro PWA', err));
        });
      }
    </script>
</head>
<body>
    <div class="painel-app" style="max-width: 400px; margin: 100px auto; text-align: center;">
        <h1>📍 Roturbo</h1>
        <div id="msg" style="color: red; margin-bottom: 10px;"></div>

        <div id="box-login">
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="senha" placeholder="Senha">
            <button id="btnEntrar">Entrar</button>
            <p id="btn-recuperar-senha" style="color: #2563eb; text-align: center; margin-top: 20px; cursor: pointer; text-decoration: underline; font-weight: bold; font-size: 14px;">Esqueci minha senha</p>
            <p onclick="alternar()" style="cursor:pointer; color: blue;">Não tem conta? Cadastre-se</p>
        </div>

        <div id="box-cadastro" style="display:none;">
            <input type="text" id="nome" placeholder="Nome Completo">
            <input type="number" id="celular" placeholder="Celular com DDD">
            <input type="email" id="c-email" placeholder="E-mail">
            <input type="password" id="c-senha" placeholder="Senha (mín. 6 dígitos)">
            <button id="btnSalvar">Criar Conta</button>
            <p onclick="alternar()" style="cursor:pointer; color: blue;">Já tem conta? Entre</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // COLOQUE SUAS CHAVES AQUI:
        const firebaseConfig = {
            apiKey: "AIzaSyBceowtEvmh9YJTLpeGR2rYnOSjmXRjH_U",
            authDomain: "roturbo.firebaseapp.com",
            projectId: "roturbo",
            storageBucket: "roturbo.firebasestorage.app",
            messagingSenderId: "356395708767",
            appId: "1:356395708767:web:4b4bb608ef29ee2a67c6ea",
            measurementId: "G-HPRKEGBZK3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Lógica de Cadastro
        document.getElementById('btnSalvar').onclick = async () => {
            const nome = document.getElementById('nome').value;
            const cel = document.getElementById('celular').value;
            const email = document.getElementById('c-email').value;
            const senha = document.getElementById('c-senha').value;

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, senha);
                
                // CALCULA 30 DIAS A PARTIR DE HOJE
                const dataFutura = new Date();
                dataFutura.setDate(dataFutura.getDate() + 30);

                await setDoc(doc(db, "usuarios", cred.user.uid), {
                    nome: nome,
                    celular: cel,
                    email: email,
                    plano: "pro", // Dá o plano PRO de presente inicial
                    vencimento: dataFutura.getTime(), // Salva a data de validade no banco
                    status: "ativo"
                });
                window.location.href = "index.html";
            } catch (e) { alert("Erro: " + e.message); }
        };

        // Lógica de Login
        document.getElementById('btnEntrar').onclick = async () => {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            try {
                await signInWithEmailAndPassword(auth, email, senha);
                window.location.href = "index.html";
            } catch (e) { alert("Dados incorretos!"); }
        };
    </script>
    <script>
        function alternar() {
            const login = document.getElementById('box-login');
            const cad = document.getElementById('box-cadastro');
            login.style.display = login.style.display === 'none' ? 'block' : 'none';
            cad.style.display = cad.style.display === 'none' ? 'block' : 'none';
        }
    </script>

    <script>
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            const banner = document.createElement('div');
            
            // ESTILO NOVO: Pílula flutuante, branca, com sombra suave no topo da tela
            banner.style = "background: #ffffff; color: #333; padding: 12px 16px; text-align: center; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 350px; z-index: 9999; cursor: pointer; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-size: 14px; border: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: center; gap: 8px;";
            
            banner.innerHTML = "<strong>📲 Baixar o App Roturbo</strong>";
            
            document.body.appendChild(banner);
            
            banner.onclick = () => { 
                banner.remove(); 
                deferredPrompt.prompt(); 
                
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('Usuário aceitou a instalação');
                    }
                    deferredPrompt = null;
                });
            };
        });
    </script>
</body>
</html>
