<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roturbo - Acesso</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('PWA ativo na tela de Login'))
            .catch(err => console.log('Erro PWA', err));
        });
      }
    </script>
</head>
<body>
    <div class="painel-app" style="max-width: 400px; margin: 100px auto; text-align: center;">
        <h1>📍 Roturbo</h1>
        <div id="msg" style="color: red; margin-bottom: 10px;"></div>

        <div id="box-login">
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="senha" placeholder="Senha">
            <button id="btnEntrar">Entrar</button>
            <p onclick="alternar()" style="cursor:pointer; color: blue;">Não tem conta? Cadastre-se</p>
        </div>

        <div id="box-cadastro" style="display:none;">
            <input type="text" id="nome" placeholder="Nome Completo">
            <input
