<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roturbo - Roteirização</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <script>
      // Registra o Service Worker para o PWA funcionar
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('PWA: Service Worker registrado!'))
            .catch(err => console.log('PWA: Erro ao registrar', err));
        });
      }
    </script>
</head>
<body>

    <div class="barra-superior">
        <button id="btn-menu" class="btn-hamburguer">☰</button>
        <h2 class="logo-texto">📍 Roturbo</h2>
    </div>

    <div id="menu-lateral" class="menu-lateral">
        <button id="btn-fechar-menu" class="btn-fechar">X</button>
        
        <div class="menu-perfil">
            <div class="foto-perfil">🚗</div>
            <p>Olá, Motorista!</p>
        </div>

        <nav class="menu-links">
            <a href="#" class="menu-item ativo">🗺️ Rota Inteligente</a>
            <a href="#" class="menu-item">🛣️ Minhas Rotas (KM)</a>
            <a href="#" class="menu-item">💰 Gestão Financeira</a>
            <a href="#" class="menu-item">⚙️ Configurações</a>
            <a href="#" class="menu-item sair" style="margin-top: 20px; color: #dc3545;">🚪 Sair</a>
        </nav>
    </div>

    <div class="painel-app">
        <h2>📍 Roteirização</h2>
        
        <label>Ponto de Partida:</label>
        <input type="text" id="origem" placeholder="Digite a origem...">

        <label>Paradas:</label>
        <div id="container-paradas"></div>
        
        <button id="btn-add-parada" type="button">+ Adicionar Parada</button>

        <label>Destino Final:</label>
        <input type="text" id="destino" placeholder="Digite o destino...">

        <button id="btn-calcular">Otimizar Minha Rota</button>

        <div id="mapa" style="height: 400px; width: 100%; border-radius: 10px; margin-top: 15px;">
            Carregando mapa...
        </div>
        
        <div id="lista-paradas"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCQiTazerx3rHFGaxTYEkbWzEuxS6TiK2w&libraries=places&callback=iniciarMapa" async defer></script>

    <script type="module" src="script.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBceowtEvmh9YJTLpeGR2rYnOSjmXRjH_U",
            authDomain: "roturbo.firebaseapp.com",
            projectId: "roturbo",
            storageBucket: "roturbo.firebasestorage.app",
            messagingSenderId: "356395708767",
            appId: "1:356395708767:web:4b4bb608ef29ee2a67c6ea"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Se não tiver logado, ele pula para o login.html automaticamente
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
            }
        });
    </script>
</body>
</html>
