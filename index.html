<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roturbo - Roteirização</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('PWA ativo'))
            .catch(err => console.log('Erro PWA', err));
        });
      }
    </script>
</head>
<body>

    <button id="btn-menu" class="btn-hamburguer">☰</button>

    <div id="mapa"></div>

    <div id="menu-lateral" class="menu-lateral">
        <button id="btn-fechar-menu" class="btn-fechar">X</button>
        <div class="menu-perfil">
            <div class="foto-perfil">🚗</div>
            <p>Olá, Motorista!</p>
        </div>
        <nav class="menu-links">
            <a href="index.html" class="menu-item ativo">🗺️ Rota Inteligente</a>
            <a href="#" class="menu-item">🛣️ Minhas Rotas (KM)</a>
            <a href="#" class="menu-item">💰 Gestão Financeira</a>
            <a href="#" class="menu-item">⚙️ Configurações</a>
            <a href="#" class="menu-item sair" style="margin-top: 20px; color: #dc3545;">🚪 Sair</a>
        </nav>
    </div>

    <div id="painel-principal" class="painel-app">
        <div class="drag-handle"></div>

        <input type="text" id="origem" placeholder="Meu local (Origem)...">

        <div id="container-paradas"></div>
        <button id="btn-add-parada" class="btn-azul" type="button">+ Adicionar Parada</button>

        <input type="text" id="destino" placeholder="Destino Final...">

        <button id="btn-calcular" class="btn-verde">Otimizar Minha Rota</button>

        <div id="lista-paradas"></div>
    </div>

    <div id="aba-historico" class="painel-app" style="display: none;">
        <h2>🛣️ KM Rodados</h2>
        <div class="card-resumo">
            <p>Total Acumulado:</p>
            <h3 id="total-km">0.00 KM</h3>
        </div>
        <div id="lista-historico">
            <p style="text-align:center;">Carregando histórico...</p>
        </div>
        <button onclick="voltarParaMapa()" style="margin-top:20px; background:#6c757d; width: 100%; color: white; border: none; padding: 12px; border-radius: 8px;">⬅ Voltar ao Mapa</button>
    </div>

    <div id="aba-financeiro" class="painel-app" style="display: none;">
        <h2 style="text-align: center;">📊 Gestão do Corre</h2>
        
        <div class="dashboard-financeiro">
            <div class="card-total">
                <small>Saldo Total (Lucro)</small>
                <h3 id="saldo-dia">R$ 0,00</h3>
            </div>
            <div class="resumo-detalhado">
                <div class="resumo-item">
                    <small>Ganhos</small>
                    <p id="total-ganhos" style="color: #28a745; font-weight: bold;">R$ 0,00</p>
                </div>
                <div class="resumo-item">
                    <small>Gastos</small>
                    <p id="total-gastos" style="color: #dc3545; font-weight: bold;">R$ 0,00</p>
                </div>
            </div>
        </div>

        <div class="formulario-financeiro">
            <h4>➕ Novo Lançamento</h4>
            
            <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                <button type="button" id="btn-financeiro-unico" style="flex: 1; font-size: 12px; background: #007bff; color: white; border: none; padding: 8px; border-radius: 5px;">Único</button>
                <button type="button" id="btn-financeiro-varios" style="flex: 1; font-size: 12px; background: #17a2b8; color: white; border: none; padding: 8px; border-radius: 5px;">Vários (Lista)</button>
            </div>

            <div id="financeiro-input-unico">
                <label>Ganho da Rota (R$):</label>
                <input type="number" id="ganho-valor" placeholder="0.00" step="0.01">
            </div>

            <div id="financeiro-input-varios" style="display: none;">
                <label>Cole os ganhos (um por linha):</label>
                <textarea id="lista-ganhos-colados" rows="4" style="width: 100%; margin-top: 5px; padding: 10px; border-radius: 5px; border: 1px solid #ccc;" placeholder="5.50&#10;12.00&#10;8.90"></textarea>
            </div>
            
            <label style="margin-top: 10px; display: block;">Categoria do Gasto:</label>
            <select id="categoria-gasto" style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px;">
                <option value="combustivel">⛽ Combustível</option>
                <option value="alimentacao">🍔 Alimentação</option>
                <option value="manutencao">🛠️ Manutenção</option>
                <option value="outros">📦 Outros</option>
            </select>

            <label>Valor Total do Gasto (R$):</label>
            <input type="number" id="gasto-valor" placeholder="0.00" step="0.01">
            
            <button id="btn-salvar-financeiro" style="background: #28a745; margin-top: 10px; width: 100%; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold;">✅ Salvar no Caixa</button>
        </div>

        <div id="lista-financeiro" style="margin-top: 20px;">
            <p style="text-align:center;">Carregando transações...</p>
        </div>
        
        <button onclick="voltarParaMapa()" style="margin-top:20px; background:#6c757d; width: 100%; color: white; border: none; padding: 12px; border-radius: 8px;">⬅ Voltar ao Mapa</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCQiTazerx3rHFGaxTYEkbWzEuxS6TiK2w&libraries=places&callback=iniciarMapa" async defer></script>

    <script type="module" src="script.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBceowtEvmh9YJTLpeGR2rYnOSjmXRjH_U",
            authDomain: "roturbo.firebaseapp.com",
            projectId: "roturbo",
            storageBucket: "roturbo.firebasestorage.app",
            messagingSenderId: "356395708767",
            appId: "1:356395708767:web:4b4bb608ef29ee2a67c6ea"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) { window.location.href = "login.html"; }
        });
    </script>
</body>
</html>
